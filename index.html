  <!-- Single Combined Script for reliable loading in all browsers -->
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext } = React;

    // --- Tweaks System ---
    const TWEAK_DEFAULTS = {
      "primaryColor": "#BE0000",
      "heroLayout": "split",
      "density": "comfortable",
      "showShopPhotos": true,
      "dark": false
    };

    const TweaksContext = createContext();

    function TweaksProvider({ children }) {
      const [tweaks, setTweaks] = useState(() => {
        try {
          const stored = localStorage.getItem('modelmania-tweaks');
          if (stored) return { ...TWEAK_DEFAULTS, ...JSON.parse(stored) };
          
          // Detect system preference if no manual tweak is saved
          const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          return { ...TWEAK_DEFAULTS, dark: prefersDark };
        } catch {
          return TWEAK_DEFAULTS;
        }
      });

      const update = (patch) => {
        const next = { ...tweaks, ...patch };
        setTweaks(next);
        try {
          localStorage.setItem('modelmania-tweaks', JSON.stringify(next));
        } catch { }
      };

      const reset = () => {
        setTweaks(TWEAK_DEFAULTS);
        try {
          localStorage.removeItem('modelmania-tweaks');
        } catch { }
      };

      return (
        <TweaksContext.Provider value={{ tweaks, update, reset }}>
          {children}
        </TweaksContext.Provider>
      );
    }

    function useTweaks() {
      return useContext(TweaksContext);
    }


    // --- Styles ---
    const navStyles = {
      header: {
        position: 'fixed', top: 0, left: 0, right: 0, height: 80,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '0 5%', zIndex: 1000, backdropFilter: 'blur(10px)'
      },
      logo: { height: 60, cursor: 'pointer' },
      nav: { display: 'flex', gap: 32 },
      link: { textDecoration: 'none', fontWeight: 600, fontSize: 14, textTransform: 'uppercase', letterSpacing: '0.05em' }
    };

    const heroStyles = {
      container: { height: '100vh', display: 'flex', alignItems: 'center', padding: '0 5%', overflow: 'hidden', position: 'relative' },
      content: { width: '50%', zIndex: 10, marginTop: 80 },
      title: { fontSize: 'clamp(3rem, 8vw, 6rem)', lineHeight: 0.9, marginBottom: 24, fontFamily: 'Outfit, sans-serif' },
      subtitle: { fontSize: '1.2rem', opacity: 0.7, marginBottom: 40, maxWidth: 500 },
      button: { padding: '16px 32px', color: '#fff', border: 'none', borderRadius: 4, fontSize: 14, fontWeight: 800, textTransform: 'uppercase', cursor: 'pointer' },
      imageContainer: { width: '60%', height: '100%', position: 'absolute', right: 0, top: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' },
      heroImage: { width: '120%', height: 'auto', objectFit: 'contain', filter: 'drop-shadow(0 20px 50px rgba(0,0,0,0.5))' }
    };

    // --- Components ---

    function Header() {
      const { tweaks } = useTweaks();
      return (
        <header className="app-header" style={{
          ...navStyles.header,
          background: tweaks.dark ? '#0a0a0a' : '#ffffff',
          borderBottom: tweaks.dark ? '1px solid #222' : 'none',
          boxShadow: tweaks.dark ? 'none' : '0 2px 10px rgba(0,0,0,0.02)'
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
            <div className="logo-container" style={{
              display: 'inline-block',
              background: '#fff',
              padding: '10px 20px',
              borderRadius: 8
            }}>
              <img
                className="logo-img"
                src="reference/Logos/Model%20Mania%20Logo.png"
                alt="Logo"
                style={{
                  ...navStyles.logo,
                  display: 'block'
                }}
              />
            </div>
          </div>
          <nav style={navStyles.nav}>
            <a href="#categories" className="nav-link" style={{ ...navStyles.link, color: tweaks.dark ? '#fff' : '#1A1A1A' }}>Categories</a>
            <a href="#featured" className="nav-link" style={{ ...navStyles.link, color: tweaks.dark ? '#fff' : '#1A1A1A' }}>Featured</a>
            <a href="#store" className="nav-link" style={{ ...navStyles.link, color: tweaks.dark ? '#fff' : '#1A1A1A' }}>Store</a>
          </nav>
          <div className="tamiya-logo-container" style={{ display: 'flex', gap: 16 }}>
            <a href="https://www.tamiya.com/english/index.html" target="_blank" rel="noopener noreferrer">
              <img
                src="reference/Logos/Tamiya%20Logo.png"
                alt="Tamiya"
                style={{
                  height: 30,
                  mixBlendMode: tweaks.dark ? 'normal' : 'multiply',
                  transition: 'opacity 0.2s ease'
                }}
                onMouseOver={e => e.target.style.opacity = '0.7'}
                onMouseOut={e => e.target.style.opacity = '1'}
              />
            </a>
          </div>
        </header>
      );
    }

    function Hero() {
      const { tweaks } = useTweaks();
      const isCentered = tweaks.heroLayout === 'centered';
      const isMinimal = tweaks.heroLayout === 'minimal';
      const words = ['IMAGINATION', 'CREATIVITY', 'CURIOSITY', 'PASSION'];
      const [index, setIndex] = React.useState(0);
      const [fade, setFade] = React.useState(true);

      React.useEffect(() => {
        const interval = setInterval(() => {
          setFade(false);
          setTimeout(() => {
            setIndex((prev) => (prev + 1) % words.length);
            setFade(true);
          }, 500);
        }, 3000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="hero-container" style={{
          ...heroStyles.container,
          background: tweaks.dark ? '#050505' : '#1A1A1A',
          color: '#fff',
          flexDirection: isCentered ? 'column' : 'row',
          justifyContent: isCentered ? 'center' : 'flex-start',
          textAlign: isCentered ? 'center' : 'left'
        }}>
          <div className="hero-content" style={{
            ...heroStyles.content,
            width: isCentered ? '80%' : '50%',
            marginTop: isCentered ? 0 : 80
          }}>
            <h1 style={heroStyles.title}>
              IGNITE YOUR<br />
              <span style={{ 
                color: tweaks.primaryColor,
                opacity: fade ? 1 : 0,
                transform: fade ? 'translateY(0)' : 'translateY(10px)',
                display: 'inline-block',
                transition: 'all 0.5s ease-in-out'
              }}>
                {words[index]}.
              </span>
            </h1>
            {!isMinimal && (
              <p style={heroStyles.subtitle}>
                Johannesburg, South Africa's premier destination for high-performance RC, precision die-cast models, and expert hobby supplies, specifically located in Roodepoort.
              </p>
            )}
            <a href="#categories" style={{ textDecoration: 'none' }}>
              <button 
                style={{ 
                  ...heroStyles.button, 
                  background: tweaks.primaryColor,
                  transition: 'transform 0.2s ease, opacity 0.2s ease'
                }}
                onMouseOver={e => e.target.style.opacity = '0.9'}
                onMouseOut={e => e.target.style.opacity = '1'}
              >
                Explore Collection
              </button>
            </a>
          </div>
          <div className="hero-image-container" style={{
            ...heroStyles.imageContainer,
            position: isCentered ? 'relative' : 'absolute',
            width: isCentered ? '100%' : '60%',
            height: isCentered ? '40%' : '100%',
            marginTop: isCentered ? 40 : 0
          }}>
            <img
              src="reference/Stock Photos/RC/Octane Brushless.png"
              alt="Hero RC"
              className="hero-image"
              style={{
                ...heroStyles.heroImage,
                transform: isCentered ? 'none' : 'rotate(-5deg) translateX(10%)',
                width: isCentered ? '60%' : '120%'
              }}
            />
          </div>
        </div>
      );
    }

    function CategoryGrid() {
      const { tweaks } = useTweaks();
      const categories = [
        { title: 'RC Vehicles', image: 'reference/Stock Photos/RC/Mini Cooper RC.png', items: 'Electric & Nitro, Off-road & Touring' },
        { title: 'Die-Cast Scale', image: 'reference/Stock Photos/Die Cast/Burago - Porche 911.jpg', items: '1:18, 1:24 Collector series' },
        { title: 'Plastics & Puzzles', image: 'reference/Stock Photos/Plastics/Tyrrell.png', items: 'Tamiya, Revell, 3D Puzzles' },
        { title: 'Paints & Tools', image: 'reference/Paints/Tamiya Lacquer Paint.png', items: 'TS, PS, XF series expert finishing' }
      ];

      const gap = tweaks.density === 'compact' ? 16 : tweaks.density === 'comfortable' ? 32 : 48;

      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap }}>
          {categories.map((c, i) => (
            <div key={i} style={{ height: 450, position: 'relative', borderRadius: 8, overflow: 'hidden' }}>
              <img src={c.image} alt={c.title} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
              <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: 32, background: 'linear-gradient(transparent, rgba(0,0,0,0.8))', color: '#fff' }}>
                <h3 style={{ fontSize: '1.5rem', marginBottom: 8 }}>{c.title}</h3>
                <p style={{ fontSize: 13, opacity: 0.8 }}>{c.items}</p>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function ProductShowcase() {
      const { tweaks } = useTweaks();
      const products = [
        { name: 'Burago Jaguar E-Type', image: 'reference/Stock Photos/Die Cast/Burago - Jaguar E-Type.jpg', type: 'Die-Cast' },
        { name: 'Octane Brushed', image: 'reference/Stock Photos/RC/Octane Brussed.png', type: 'RC' },
        { name: 'Lotus F1', image: 'reference/Stock Photos/Plastics/Lotus.png', type: 'Plastic Kit' },
        { name: 'Maisto VW Combi', image: 'reference/Stock Photos/Die Cast/Maisto - VW Combi.jpg', type: 'Die-Cast' }
      ];

      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: 24 }}>
          {products.map((p, i) => (
            <div key={i} style={{ background: tweaks.dark ? '#111' : '#f9f9f9', padding: 24, borderRadius: 12, textAlign: 'center' }}>
              <img src={p.image} alt={p.name} style={{ width: '100%', height: 200, objectFit: 'contain', marginBottom: 16 }} />
              <p style={{ fontSize: 12, color: tweaks.primaryColor, fontWeight: 800, textTransform: 'uppercase', marginBottom: 4 }}>{p.type}</p>
              <h4 style={{ fontSize: '1rem', fontFamily: 'Outfit' }}>{p.name}</h4>
            </div>
          ))}
        </div>
      );
    }

    function StoreTour() {
      const { tweaks } = useTweaks();
      const scrollRef = React.useRef(null);
      const [isInteracting, setIsInteracting] = React.useState(false);

      if (!tweaks.showShopPhotos) return null;

      const photos = [
        'reference/Shop Photos/Puzzle Room 1.png',
        'reference/Shop Photos/Puzzel Room 2.png',
        'reference/Shop Photos/WhatsApp Image 2026-05-06 at 16.28.37.jpeg',
        'reference/Shop Photos/WhatsApp Image 2026-05-06 at 16.28.32.jpeg',
        'reference/Shop Photos/WhatsApp Image 2026-05-06 at 16.28.33.jpeg',
        'reference/Shop Photos/WhatsApp Image 2026-05-06 at 16.28.35.jpeg',
        'reference/Shop Photos/WhatsApp Image 2026-05-06 at 16.28.36.jpeg',
        'reference/Shop Photos/WhatsApp Image 2026-05-06 at 16.28.30.jpeg'
      ];

      // Duplicate photos for infinite loop effect
      const allPhotos = [...photos, ...photos, ...photos];

      useEffect(() => {
        let animationFrame;
        const scroll = () => {
          if (scrollRef.current && !isInteracting) {
            scrollRef.current.scrollLeft += 0.5; // Very slow move
            
            // Loop back seamlessly
            if (scrollRef.current.scrollLeft >= scrollRef.current.scrollWidth / 2) {
              scrollRef.current.scrollLeft = 0;
            }
          }
          animationFrame = requestAnimationFrame(scroll);
        };
        animationFrame = requestAnimationFrame(scroll);
        return () => cancelAnimationFrame(animationFrame);
      }, [isInteracting]);

      return (
        <div 
          ref={scrollRef}
          className="carousel-track-container"
          onMouseEnter={() => setIsInteracting(true)}
          onMouseLeave={() => setIsInteracting(false)}
          onTouchStart={() => setIsInteracting(true)}
          onTouchEnd={() => setIsInteracting(false)}
        >
          <div className="carousel-track">
            {allPhotos.map((p, i) => (
              <div key={i} className="carousel-item">
                <img src={p} alt={`Store view ${i}`} />
              </div>
            ))}
          </div>
        </div>
      );
    }

          color: '#fff',

            />
          </div>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 48, marginBottom: 40, flexWrap: 'wrap' }}>
            <div>
              <h4 style={{ marginBottom: 16 }}>Location</h4>
              <a 
                href="https://maps.app.goo.gl/R5Exv62XBwjgGohj6" 
                target="_blank" 
                rel="noopener noreferrer" 
                style={{ color: '#888', fontSize: 14, textDecoration: 'none' }}
                onMouseOver={e => e.target.style.color = '#fff'}
                onMouseOut={e => e.target.style.color = '#888'}
              >
                26 Kruin Office Park Corner Banket,<br />Ruhamah Dr, Helderkruin,<br />Roodepoort, 1725
              </a>
            </div>
            <div>
              <h4 style={{ marginBottom: 16 }}>Contact</h4>
              <p style={{ color: '#888', fontSize: 14 }}>Call: +27 63 480 5797<br />WhatsApp: 083 380 1792</p>
            </div>
          </div>
          <div style={{ borderTop: '1px solid #222', paddingTop: 40, fontSize: 12, color: '#444' }}>
            &copy; 2026 Model Mania Hobbies. Created by <a href="https://portfolio.lukekappa.tech" target="_blank" rel="noopener noreferrer" style={{ color: '#666', textDecoration: 'none', borderBottom: '1px solid #333' }}>Luke</a>.
          </div>
        </footer>
      );
    }

    function SectionTitle({ title, subtitle, color }) {
      const { tweaks } = useTweaks();
      return (
        <div style={{ marginBottom: 60, textAlign: 'center' }}>
          <h2 style={{ fontSize: 'clamp(2rem, 5vw, 3.5rem)', marginBottom: 12, color }}>{title}</h2>
          <p style={{ color: tweaks.dark ? 'rgba(255,255,255,0.6)' : '#666', fontSize: '1.1rem' }}>{subtitle}</p>
          <div style={{ width: 60, height: 4, background: tweaks.primaryColor, margin: '24px auto 0' }}></div>
        </div>
      );
    }

    function Lightbox({ src, onClose }) {
      if (!src) return null;
      return (
        <div 
          onClick={onClose}
          style={{
            position: 'fixed', top: 0, left: 0, width: '100vw', height: '100vh',
            background: 'rgba(0,0,0,0.9)', zIndex: 10000, display: 'flex',
            alignItems: 'center', justifyContent: 'center', cursor: 'zoom-out',
            animation: 'fadeIn 0.3s ease'
          }}
        >
          <img 
            src={src} 
            style={{ maxWidth: '90%', maxHeight: '90%', borderRadius: 8, boxShadow: '0 0 50px rgba(0,0,0,0.5)' }} 
            alt="Enlarged view"
          />
          <button style={{
            position: 'absolute', top: 30, right: 30, background: 'none', border: 'none',
            color: '#fff', fontSize: 40, cursor: 'pointer'
          }}>&times;</button>
        </div>
      );
    }

    function App() {
      const { tweaks } = useTweaks();
      const [selectedImg, setSelectedImg] = React.useState(null);

      // Global click handler to find images
      const handleImgClick = (e) => {
        if (e.target.tagName === 'IMG' && !e.target.closest('.nav-link') && !e.target.closest('header')) {
          setSelectedImg(e.target.src);
        }
      };

      return (
        <div 
          onClick={handleImgClick}
          style={{
            background: tweaks.dark ? '#0a0a0a' : '#fafafa',
            color: tweaks.dark ? '#fff' : '#1a1a1a',
            transition: 'background 0.3s ease, color 0.3s ease',
            minHeight: '100vh',
            '--underline-color': tweaks.primaryColor,
            cursor: 'default'
          }}
        >
          <Header />
          <Hero />
          <section id="categories" style={{ padding: '80px 5%' }}>
            <SectionTitle title="The Collection" subtitle="Explore our curated departments" color={tweaks.dark ? '#fff' : '#1a1a1a'} />
            <CategoryGrid />
          </section>
          <section id="featured" style={{ background: tweaks.dark ? '#000' : '#fff', padding: '80px 5%', transition: 'background 0.3s ease' }}>
            <SectionTitle title="Spotlight" subtitle="High-performance highlights" color={tweaks.dark ? '#fff' : '#1a1a1a'} />
            <ProductShowcase />
          </section>
          {tweaks.showShopPhotos && (
            <section id="store" style={{ padding: '80px 5%' }}>
              <SectionTitle title="Visit Us" subtitle="Experience the hobby shop in person" color={tweaks.dark ? '#fff' : '#1a1a1a'} />
              <StoreTour />
            </section>
          )}
          <Footer />
          <Lightbox src={selectedImg} onClose={() => setSelectedImg(null)} />
          <style>{`
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            img:not(header img) { cursor: zoom-in; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <TweaksProvider>
        <App />
      </TweaksProvider>
    );
  </script>
</body>

</html>
